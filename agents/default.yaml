# 默认 Agent 配置
# 文件名（不含 .yaml）即为此 Agent 的唯一 ID

# 显示名称
name: 默认助手

# 描述
description: 全能 AI 助手，拥有完整的系统操作能力

# 使用的 LLM Provider 名称（对应 config/providers.json 中的 name）
# 留空则使用当前激活的 Provider
provider: ""

# Agent 专属 System Prompt（追加在基础 prompt 之后）
# 留空则只使用基础 prompt
system_prompt: ""

# 工作目录，留空则使用全局 WORKSPACE_DIR
workdir: ""

# 可用的基础工具（从已注册工具中按名称选取）
# 留空表示使用全部已注册工具
base_tools: []

# 激活的 Skill ID 列表
skills: []

# 长期记忆配置
memory:
  global: true    # 是否使用全局长期记忆
  private: true   # 是否有 Agent 私有长期记忆
